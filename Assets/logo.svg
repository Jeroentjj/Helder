<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Warm background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF7F2"/>
      <stop offset="100%" stop-color="#F0E8DC"/>
    </linearGradient>
    <!-- Mood ring gradient: terracotta → amber → sage (the emotional arc) -->
    <linearGradient id="ring" x1="0.1" y1="0.1" x2="0.9" y2="0.9">
      <stop offset="0%" stop-color="#C4654A"/>
      <stop offset="45%" stop-color="#D4952A"/>
      <stop offset="100%" stop-color="#7A9E7E"/>
    </linearGradient>
    <!-- Soft inner glow -->
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="114" fill="url(#bg)"/>

  <!-- Outer mood ring -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#ring)" stroke-width="44" stroke-linecap="round"/>

  <!-- Inner filled circle (the calm center) -->
  <circle cx="256" cy="256" r="86" fill="url(#ring)"/>
  <circle cx="256" cy="256" r="86" fill="url(#glow)"/>

  <!-- A small opening in the ring at top — the 'gap' suggesting openness / a clearing (helder = clear) -->
  <rect x="236" y="76" width="40" height="48" rx="20" fill="url(#bg)"/>
</svg>
